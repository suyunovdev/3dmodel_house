name: Release Check

on:
  push:
    branches: [main]

jobs:
  check:
    name: Production Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @ai-house-planner/shared build

      - name: Build backend
        run: pnpm --filter @ai-house-planner/backend build

      - name: Build frontend
        run: pnpm --filter @ai-house-planner/frontend build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}
          SKIP_ENV_VALIDATION: true

      - name: Build telegram-bot
        run: pnpm --filter @ai-house-planner/telegram-bot build

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| shared | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| backend | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| telegram-bot | ✅ |" >> $GITHUB_STEP_SUMMARY
